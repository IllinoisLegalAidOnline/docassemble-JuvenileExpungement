id: arrests records intro
continue button field: arrests_intro
question: |
  Arrests and court records
subquestion: |
  The next screens will ask about your juvenile records. These include your arrest records and your court file. The questions will ask details to check if the arrests and prosecutions are eligible for expungment.
  
  This program will only work for the arrests and prosecutions it finds expungable. Even if this program says a case is not expungable, there may be other ways to remove it from your record. You may want to talk to a lawyer about expungment. Use **[Get Legal Help](https://www.illinoislegalaid.org/get-legal-help)** to find free or low-cost legal services in your area. 
