event: no_cases_kickout
question: |
  Sorry
subquestion: |
  Based on your ansers, none of the arrests you have entered qualify for expungement.

  You can talk with a lawyer to discuss your options. Use **[Get Legal Help](https://www.illinoislegalaid.org/get-legal-help)** to find free or low-cost legal services in your area.

  If you made a mistake, you can click the **Arrests** button to change your answers.
buttons:
  - Exit: exit
  - Restart: restart
