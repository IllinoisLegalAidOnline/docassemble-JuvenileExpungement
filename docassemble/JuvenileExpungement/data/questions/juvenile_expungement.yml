id: welcome
question: |
  Expunge juvenile records
subquestion: |
  Welcome to Illinois Legal Aid Online's **Expunge juvenile records** Easy Form.

  This program will help you create forms to clear juvenile arrests and adjudications from your criminal record.
  
  The forms you make with this program can only be used in Illinois.
  
  To learn more, read ILAO's article,[**Juvenile expungement basics**](https://www.illinoislegalaid.org/node/51836).
field: sees_nav_bar
---
id: instructions
continue button field: how_to_use
question: |
  Instructions
subquestion: |
  To expunge a case with this program you will need to know the:
  
  * Arrest date,
  * Arresting agency,
  * Case number,
  * Charge,
  * Outcome, and
  * Date of conviction
    
  This information may be found on:

  * Court dispositions,
  * Your Illinois State Police RAP sheet, or
  * Your Chicago Police RAP sheet.
  
  Set aside 10 to 20 minutes to finish this program. You can log in and save your work to continue later. 
 
  ${ collapse_template(help_example) }  

  Click on **{green words}** to learn what they mean. Some pages have a question mark in a circle ${ fa_icon("question-circle", color_css="#0dcaf0" ) } that helps explain things.
