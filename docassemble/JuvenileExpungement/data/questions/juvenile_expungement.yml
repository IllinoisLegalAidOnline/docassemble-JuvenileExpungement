  What is the case number of your ${arrests[i].date} arrest?
subquestion: |
  **Note**: It is important to add the case number so the court case records and the arrest records can be expunged. If you know there is a court case but can't find the number, you can use **[Get Legal Help](https://www.illinoislegalaid.org/get-legal-help)** to find free or low-cost legal services in your area.
  
  If you did not go to court for the ${arrests[i].date} arrest, you can leave this blank.

   ${collapse_template(where_to_find_records_help)}
