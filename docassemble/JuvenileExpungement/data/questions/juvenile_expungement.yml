id: about expungement 
continue button field: about_expungement 
question: | 
  About expungement 
subquestion: | 
  Some juvenile arrests and court records can expunged. To 'expunge' means to erase the police and court records of the case. 

  This program will create a *Request to Expunge Juvenile Records*. This form will include any of your eligible juvenile arrests and court records. You can only include court records from one county in the request. If you need to expunge records in more than one county, you will need to run this program again to make more forms.

  If you have arrests involving cannabis, you may want to read ILAO's article, [**Cannabis legalization and expungement basics**](https://www.illinoislegalaid.org/legal-information/cannabis-legalization-and-expungement-basics). 

  To learn more about expungement, read ILAO's article [**starting a request to expunge or seal a juvenile arrest record**](https://www.illinoislegalaid.org/legal-information/starting-request-expunge-or-seal-juvenile-arrest-record).
---
id: read or skip information
question: |
  More information about clearing your criminal record
subquestion: |
  To get detailed information about clearing your criminal record, you may want to start with ILAO's guide to [**Juvenile record expungement**](https://www.illinoislegalaid.org/node/51836).

  You can also read more on the next four screens of this Easy Form. If you want to read more information now, click **Yes**. You can go through it before making your forms.

  If you want to read more information later, click **No**. It is linked on any Review screen. Just click **:edit: Edit answers** later in the Easy Form.  Also, the information will be included in the instructions you can download when you get your forms.

  **Note:** We recommend you read this information now. If you miss something, you can always come back to it later. 
fields:
  - Read more information about criminal records now?: read_or_skip
    datatype: yesnoradio
---
id: expungement info
continue button field: expungement_info
question: |
  Clearing your criminal record in Illinois
subquestion: |
  When you are arrested or charged with an offense, a criminal record is created, even if you are not found guilty. Juvenile records can be read by law enforcement agencies, some employers, and some government agencies. To have your records erased or hidden you must file a *${ form_name }* with the court and have a judge approve your *Request*.

  There are three ways to clear your criminal record:

  * **Expungement**: Erases arrests, dismissed charges, court supervisions, and qualified probations that were completed successfully from your criminal record so it is like they never happened.
  * **Sealing**: Juvenile records are automatically sealed. However, law enforcement agencies can still see sealed records. Employers required by law to conduct background checks can see sealed felony convictions. They cannot see sealed misdemeanor convictions or cases not resulting in convictions unless the employer is a law enforcement agency.
  * **Executive Clemency**: If you do not qualify for expungement, you can apply for a pardon from the Governor forgiving you for your criminal convictions. A pardon does not erase or hide your conviction on its own. If you get a pardon authorizing expungement, you can then apply to have your record expunged. To learn more about getting a pardon, read ILAO's article about [**executive clemency**](https://www.illinoislegalaid.org/node/37761).
---
id: more expungement info
continue button field: more_expungement_info
question: |
  Obstacles to clearing your criminal records
subquestion: |
  You might not be eligible for getting your criminal records expunged or sealed if:
  
  * You have any pending criminal charges,
  * You have not completed your sentence, including parole, probation, or court supervision,
  * Your records for some offenses are not eligible for expungement or sealing, or
  * A required waiting period for sealing your offense has not passed yet.

  Also, police departments and prosecutors for your criminal cases get a chance to object to your *Request* to expunge juvenile records.

  * The police departments and prosecutors have 45 days from the day they receive your *Request* to file a written objection with the court. If they **object**, it means they do not want your record to be expunged or sealed. If the agencies do not object during the 45 days, they cannot object at a later time.
  * An **objection** does not mean the court is denying your *Request*. The court will consider the objection when deciding if your criminal record will be expunged or sealed.
---
id: records info
continue button field: records_info
question: |
  Two kinds of criminal records
subquestion: |
  There are two types of criminal records: court records and police records. You do not need to pay for copies of all of your criminal records.

  **Court records**

  * You will need records for all of your court cases. This may be called a "docket sheet" or a "disposition." A disposition is the final judgment or outcome in a court case. There are no court dispositions for arrests or charges that did not lead to a court case.

  **Police records**

  * An Illinois State Police Statewide Criminal History Transcript lists most arrests and convictions that happened in Illinois.
  * A Chicago RAP Sheet (Record of Arrests and Prosecutions) lists all arrests, charges, and court case outcomes that happened in Chicago.
---
id: more records info
continue button field: more_records_info
question: |
  How to view or get copies of your criminal records
subquestion: |
  Juvenile arrest records are available at the Juvenile Courthouse located at 1100 South Hamilton in Chicago. You can also get assistance from [**Legal Aid Chicago’s Juvenile Expungement Help Desk**](https://legalaidchicago.org/get-help/court-based-help-desks/).  If you were arrested by the Chicago Police Department, you can also get your RAP sheet from them.

  In the rest of Illinois, you can get your records from the agency that arrested you or through the Ilinois State Police's  Access and Review Process.

  For more information, you can read the Illinois Courts instructions on [**how to expunge juvenile records**](https://www.illinoiscourts.gov/documents-and-forms/approved-forms/circuit-court-standardized-forms-suites/expungement-sealing/).

  Records from the **Circuit Clerk**: Many court records are available online. Some counties, like Cook County, do not provide online access to criminal records.
  ${ collapse_template(clerk_records_help) } 
  
  Records from the **Illinois State Police**: You are allowed to access your entire criminal history information from the Illinois State Police. Although not required, it is the best available source for your statewide criminal record. Please note, there might be discrepancies or missing information.
  ${ collapse_template(isp_records_help) }

  Records from the **Chicago Police Department**: If you were arrested in Chicago, you must get your records from the Chicago Police Department. Order a RAP sheet from the Chicago Police Department if you were arrested in Chicago. There will be a fee.
  ${ collapse_template(cpd_records_help) }
---
template: clerk_records_help
subject: |
  **How to access records from the Circuit Clerk**
content: |  
  If you cannot find your court records online, go to the Circuit Clerk's Office in the county where your case was filed. Ask the Circuit Clerk for the information you need to fill out the forms. This information can be found in your court records.
  
  You may be able to use the public computer at the Circuit Clerk's office to look up records and print them out or write down the information. Copies are available for a fee. Find your Circuit Clerk's website at: [ilcourts.info/clerks](https://ilcourts.info/clerks).
---
template: isp_records_help
subject: |
  **How to access records from the Illinois State Police**
content: |
  You can get a "Statewide Criminal History Transcript" in 3 ways:

  * From the Illinois State Police:[NEWLINE]
    Illinois State Police[NEWLINE]
    Bureau of Identification[NEWLINE]
    260 North Chicago Street[NEWLINE]
    Joliet, Illinois 60432[NEWLINE]
    (815) 740-5160[NEWLINE]
    [isp.illinois.gov/BureauOfIdentification](https://isp.illinois.gov/BureauOfIdentification)

  * From your local law enforcement agency:[NEWLINE]
    Every law enforcement agency is allowed to provide you this information. Check with your local law enforcement agency to find out costs and times for fingerprinting.

  * From any licensed LiveScan vendor to get your transcript using your fingerprint. Find a Fingerprint Vendor at the [Illinois Department of Financial and Professional Regulation](https://idfprapps.illinois.gov/licenselookup/fingerprintlist.asp) website.
---
template: cpd_records_help
subject: |
  **How to access records from the Chicago Police Department**
content: |
  To access records from the Chicago Police Department:
  
  * You must go to the Chicago Police Department to get your Chicago RAP sheet:[NEWLINE]
    Chicago Police Headquarters[NEWLINE]
    3510 S. Michigan Ave.[NEWLINE]
    Chicago, IL[NEWLINE]
    (312) 745-5508[NEWLINE]
  
  * You will receive your RAP sheet in the mail.
  
  * You should also request a copy of your Illinois State Police Statewide Criminal History Transcript. The Chicago Police will provide your state record for no additional cost.
---
id: about juvenile records
continue button field: about_juvenile_records
question: |
  About juvenile records
subquestion: |
  A juvenile record is created when someone is arrested before their 18th birthday.

  ${collapse_template(seventeen_years)}

  A juvenile record of the arrest exists even if you never went to court or saw a judge. If you are unsure if you were arrested, you can contact the law enforcement agency that arrested you.

  Juvenile records are automatically sealed. The public cannot see them without a court order. However, some employers and government agencies still have access unless the records are expunged.

  If you were arrested when you were 18 or older, you may be able to expunge your adult records using ILAO's [**Criminal record expungement or sealing request Easy Form**](https://www.illinoislegalaid.org/legal-information/criminal-record-expungement-or-sealing-request).

---
template: seventeen_years
subject: |
  **What if I was arrested when I was 17 years old?**
content: |
  If you were arrested before 2010, you were given an adult record

  If you were arrested between 2010 and 2013, you may have gotten a juvenile record. At that time, 17-year-olds arrested for misdemeanors got juvenile records and 17-year-olds arrested for felonies got adult records.

  If you were arrested after 2013, you were given a juvenile record.
