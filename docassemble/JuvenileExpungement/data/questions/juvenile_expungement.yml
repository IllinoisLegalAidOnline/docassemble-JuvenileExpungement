#arrests gather loop
code: |
  arrests[i].date
  if arrests[i].after_arrest == "court":
    if arrests[i].at_court == "other":
      if arrests[i].found_guilty == "other" or arrests[i].found_guilty == "traffic" or arrests[i].found_guilty == "murder":
        arrests[i].cannot_expunge_offense_type
      elif arrests[i].found_guilty == "felony_or_a":
        if arrests[i].must_register:
          arrests[i].cannot_expunge_registry
        elif arrests[i].case_end_date > today().minus(years=2):
          arrests[i].cannot_expunge_recent
  elif arrests[i].after_arrest == "successful_supervision" or arrests[i].after_arrest == "failed_supervision":
    if arrests[i].must_register:
      arrests[i].cannot_expunge_registry
    
  if is_eligible(arrests[i]):
    arrests[i].charge
    arrests[i].agency.name.first
    arrests[i].case_number
    arrests[i].enforcement_number

  arrests[i].complete = True
---
code: |
  def is_eligible(arrest):
    if arrest.after_arrest == "court" and arrest.at_court == "other":
      if arrest.found_guilty == "other" or arrest.found_guilty == "traffic" or arrest.found_guilty == "murder":
        return False
      elif arrest.found_guilty == "felony_or_a" and (arrest.must_register or arrest.case_end_date > today().minus(years=2)):
        return False
    elif (arrest.after_arrest == "successful_supervision" or (arrest.after_arrest == "failed_supervision" and not arrest_after_arrest == "no_charge")) and arrest.must_register:
      return False
    return True
---
code: |
  def which_subsection(arrest):
    if arrest.after_arrest == "court" and arrest.at_court == "other" and arrest.found_guilty == "felony_or_a":
      return "2"
    else:
      return "1"
---
reconsider: True
code: |
  qualified_arrests = [arrest for arrest in arrests if is_eligible(arrest) == True]
  filter_arrests = True
