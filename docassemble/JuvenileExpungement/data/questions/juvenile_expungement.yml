      max: |
        Only arrests from when you were under 18 years of age are juvenile records.
---
id: after arrest
question: |
  What happened after the ${arrests[i].arrest_date} arrest?
field: arrests[i].after_arrest
choices:
  - I was released without being charged in court.: no_charge
  - I was given a diversion program at the police station or at the probation department.: diversion
  - I was given supervision, which the court said was completed successfully.: successful_supervision
  - I was given supervision, which the court said was **not** completed successfully.: falied_supervision
  - I went to court (saw a judge).: court
---
id: at court
question: |
  What happened when you went to court for the ${arrests[i].arrest_date} arrest?
field: arrests[i].at_court
choices:
  - The case was thrown out (dismissed).: dismissed
  - I was found not delinquent (not guilty).: delinquent
  - Something else happened: other
---
id: found guilty
question: |
  Were you found guilty of any of the following?
field: arrests[i].found_guilty
choices:
  - A traffic offense: traffic
  - First-degree murder or a felony sex offense: murder
  - A felony or class A misdemeanor: felony_or_a
  - A Class B or Class C misdemeanor: b_or_c
  - A petty offense: petty
  - No, I was not found guilty of any of these.: other
---
id: arrest registry
question: |
  Did the court require you to register on the Juvenile Sex Offender Registry?
subquestion: |
  If you were found guilty for a sex offense, the court should have told you that you must register as a Juvenile Sex Offender.

  To learn more about the Juvenile Sex Offender Registry, read ILAO's article, [**Can a sex offender be removed from the registry?**](https://www.illinoislegalaid.org/legal-information/appealing-my-registration-sex-offender).
fields:
  - no label: arrests[i].must_register
    datatype: yesnoradio
---
id: arrest is expungeable
continue button field: arrests[i].is_expungeable
question: |
